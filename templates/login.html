<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - BI SIS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/css/tabler.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body class="login-page">
<main class="login-screen">
    <section class="login-panel" aria-labelledby="login-title">
        <div class="login-panel-brand">
            <img src="{{ url_for('static', filename='img/logo_hospital.jpg') }}" alt="Logo Hospital San Juan de Dios de Pisco">
            <h1 id="login-title">BI - SIS 2025</h1>
            <p class="login-hospital-name">Hospital San Juan de Dios de Pisco</p>
            <p class="login-access-note">Acceso restringido a personal autorizado</p>
        </div>

        <form method="post" action="{{ url_for('auth.login') }}" autocomplete="off" class="login-form">
            <h2>Acceso al sistema</h2>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="login-alerts" aria-live="polite">
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }}" role="alert">{{ message }}</div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <div class="login-field">
                <label class="form-label" for="username">Usuario</label>
                <input id="username" autocomplete="username" type="text" name="username" class="form-control" placeholder="Ingrese su usuario" required autofocus>
            </div>

            <div class="login-field">
                <label class="form-label" for="password">Contraseña</label>
                <input id="password" autocomplete="current-password" type="password" name="password" class="form-control" placeholder="Ingrese su contraseña" required>
            </div>

            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <button type="submit" class="btn btn-primary login-submit">Iniciar sesión</button>
        </form>
    </section>
</main>
</body>
</html>
